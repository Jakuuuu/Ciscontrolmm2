<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimento: Relámpago DDCE (Optimizado)</title>
    <style>
        /* Contención absoluta para cero contaminación global */
        #ddce-experiment-wrapper {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050510;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            position: relative;
        }
        #ddce-experiment-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ddce-experiment-wrapper .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.95);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        #ddce-experiment-wrapper h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 150, 255, 0.4);
            letter-spacing: 2px;
            font-weight: 800;
        }
        #ddce-experiment-wrapper p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body style="margin:0; padding:0;">
    <div id="ddce-experiment-wrapper">
        <div class="hero-content">
            <h1>SISTEMA DDCE</h1>
            <p>Deionizador de Cargas Electromagnéticas</p>
        </div>
        
        <canvas id="lightningCanvas"></canvas>
    </div>

    <script>
        /**
         * Experimento 01: Relámpago procedural, expansión lenta.
         * VERSIÓN QA OPTIMIZADA: Eliminación de shadowBlur, protección contra bloqueo MainThread y contraste protegido.
         */
        const canvas = document.getElementById('lightningCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimización: alpha false renderiza más rápido si es fondo nativo
        
        let width, height;
        let lightningNodes = [];
        
        const LIGHTNING_COLOR = 'rgba(136, 204, 255, ';
        const GLOW_COLOR = 'rgba(0, 102, 255, ';
        
        // Parámetros Optimizados para salud del Main Thread
        const BRANCH_PROBABILITY = 0.025; // Previene explosiones exponenciales
        const SPEED = 2.5; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // Pre-fill crítico al usar context con alpha false
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height);
        }
        window.addEventListener('resize', resize);
        resize();

        class LightningNode {
            constructor(x, y, dx, dy, thickness, generation) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.thickness = thickness;
                this.generation = generation;
                this.history = [{x, y}];
                this.age = 0;
                this.maxAge = 100 + Math.random() * 60; // Desvanecimiento más rápido (GC)
                this.isDead = false;
                this.alpha = 1;
            }

            update() {
                if (this.isDead) return;
                
                const chaos = (4 - this.generation) * 1.5;
                this.dx += (Math.random() - 0.5) * chaos;
                this.dy += (Math.random() - 0.1) * chaos; // Tendencia principal descendente
                
                const vectorLength = Math.sqrt(this.dx * this.dx + this.dy * this.dy);
                if (vectorLength > 0) {
                    this.dx = (this.dx / vectorLength) * SPEED;
                    this.dy = (this.dy / vectorLength) * SPEED;
                }
                
                this.x += this.dx;
                this.y += this.dy;
                this.history.push({x: this.x, y: this.y});
                
                this.age++;
                
                // PERFORMANCE: Ramificaciones estancadas en nivel 3. Pasando el nivel 3 la trigonometría asfixia el TBT.
                if (Math.random() < BRANCH_PROBABILITY && this.generation < 3 && this.age < this.maxAge * 0.7) {
                    const angle = Math.atan2(this.dy, this.dx) + (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.5 + 0.2);
                    lightningNodes.push(new LightningNode(this.x, this.y, Math.cos(angle), Math.sin(angle), this.thickness * 0.65, this.generation + 1));
                }
                
                if (this.age > this.maxAge || this.y > height + 100 || this.x < -100 || this.x > width + 100) {
                    this.isDead = true;
                }
            }

            draw(ctx) {
                if (this.history.length < 2) return;
                if (this.isDead) this.alpha -= 0.02;
                if (this.alpha <= 0.05) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // OPTIMIZACIÓN CRÍTICA: Reemplazo del repintado masivo de shadowBlur por overlay visual primitivo
                ctx.strokeStyle = GLOW_COLOR + (this.alpha * 0.4) + ')';
                ctx.lineWidth = this.thickness * 3;
                ctx.stroke();

                // Núcleo blanco iterativo normal
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.lineWidth = this.thickness * 0.5;
                ctx.stroke();
            }
        }

        let flashOpacity = 0;

        function animate() {
            ctx.fillStyle = `rgba(5, 5, 16, 0.5)`; // Relleno de desvanecimiento
            ctx.fillRect(0, 0, width, height);

            if (flashOpacity > 0) {
                // Background sky azulado seguro en contraste front-end
                ctx.fillStyle = `rgba(136, 204, 255, ${flashOpacity})`;
                ctx.fillRect(0, 0, width, height);
                flashOpacity -= 0.05;
            }

            let activeBranches = 0;
            
            for (let i = lightningNodes.length - 1; i >= 0; i--) {
                const node = lightningNodes[i];
                node.update();
                node.draw(ctx);
                
                if (!node.isDead) activeBranches++;
                if (node.alpha <= 0.05) lightningNodes.splice(i, 1);
            }

            if (activeBranches === 0 && Math.random() < 0.005) {
                startLightning();
            }

            requestAnimationFrame(animate);
        }

        function startLightning() {
            lightningNodes = [];
            flashOpacity = 0.15; // Límite bajado drásticamente para prevenir ahogo del nivel de contraste (AA / AAA WCAG test)
            const startX = width * (0.2 + Math.random() * 0.6);
            lightningNodes.push(new LightningNode(startX, -10, 0, 1, 5, 0));
        }

        // POSTERGACIÓN DE MONTAJE PARA SALVAGUARDAR LCP EN LIGHTHOUSE METRICS.
        window.addEventListener('load', () => {
            setTimeout(() => {
                startLightning();
                requestAnimationFrame(animate);
            }, 1000); // 1 segundo post-load para asegurar render sin obstrucciones visuales.
        });

    </script>
</body>
</html>
